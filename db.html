<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POFESSOR DATABASE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
:root {
    --accent: #00ff88;
    --glass-bg: rgba(0,0,0,0.7);
    --glass-border: rgba(255,255,255,0.1);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
    background:#000 url('https://host.wuaze.com//sites/Paris.jpg') no-repeat center fixed;
    background-size:cover;
    color:#fff;
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.glass-panel{
    width:95%;
    max-width:450px;
    background:var(--glass-bg);
    backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    border-radius:30px;
    padding:25px;
}

h1{
    text-align:center;
    color:var(--accent);
    margin-bottom:20px;
}

#targetInput{
    width:100%;
    padding:15px;
    border-radius:10px;
    background:#000;
    color:var(--accent);
    text-align:center;
    font-size:18px;
    margin-bottom:15px;
}

.dial-pad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:15px;
}

.dial-btn{
    padding:15px;
    border-radius:10px;
    background:#111;
    color:#fff;
    border:1px solid var(--glass-border);
}

.btn{
    width:100%;
    padding:15px;
    background:var(--accent);
    color:#000;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

.result-card{
    background:#000;
    padding:15px;
    margin-top:15px;
    border-left:4px solid var(--accent);
}

.map-box{
    height:150px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="glass-panel">

<h1>POFESSOR DATABASE</h1>

<input type="text" id="targetInput" readonly placeholder="03XXXXXXXXX">

<div class="dial-pad">
<button onclick="dial('1')" class="dial-btn">1</button>
<button onclick="dial('2')" class="dial-btn">2</button>
<button onclick="dial('3')" class="dial-btn">3</button>
<button onclick="dial('4')" class="dial-btn">4</button>
<button onclick="dial('5')" class="dial-btn">5</button>
<button onclick="dial('6')" class="dial-btn">6</button>
<button onclick="dial('7')" class="dial-btn">7</button>
<button onclick="dial('8')" class="dial-btn">8</button>
<button onclick="dial('9')" class="dial-btn">9</button>
<button onclick="dial('C')" class="dial-btn">CLR</button>
<button onclick="dial('0')" class="dial-btn">0</button>
<button onclick="dial('B')" class="dial-btn">DEL</button>
</div>

<button onclick="searchData()" class="btn">SEARCH</button>

<div id="results"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
function dial(key){
    let input=document.getElementById('targetInput');

    if(key==='C') input.value='';
    else if(key==='B') input.value=input.value.slice(0,-1);
    else if(input.value.length<13) input.value+=key;
}

async function searchData(){
    let val=document.getElementById('targetInput').value;
    let res=document.getElementById('results');

    if(val.length<5){
        alert("Enter valid number");
        return;
    }

    res.innerHTML="Searching...";

    try{
        let r=await fetch(`https://howler-database-api.vercel.app/api/data?phone=${val}`);
        let data=await r.json();

        res.innerHTML="";

        if(data.success && data.records.length){

            data.records.forEach((rec,i)=>{

                let card=document.createElement('div');
                card.className="result-card";

                let addr=rec.Address || "N/A";

                card.innerHTML=`
                <p><b>Name:</b> ${rec.Name}</p>
                <p><b>Mobile:</b> ${rec.Mobile}</p>
                <p><b>CNIC:</b> ${rec.CNIC}</p>
                <p><b>Address:</b> ${addr}</p>
                <div id="map${i}" class="map-box"></div>
                `;

                res.appendChild(card);

                setTimeout(()=>{
                    let map=L.map(`map${i}`).setView([30,70],5);

                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`)
                    .then(r=>r.json())
                    .then(g=>{
                        if(g[0]){
                            let pos=[g[0].lat,g[0].lon];
                            map.setView(pos,14);
                            L.marker(pos).addTo(map);
                        }
                    });

                },300);

            });

        } else {
            res.innerHTML="No Record Found";
        }

    }catch(e){
        res.innerHTML="Server Error";
    }
}
</script>

</body>
</html>
