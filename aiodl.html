<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIO Video Downloader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 24px; }
        .download-btn { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .download-btn:active { transform: scale(0.96); }
        .loader-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4 pt-10 text-slate-200">

    <div class="max-w-md w-full glass-card p-6 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-800 tracking-tight text-blue-400 uppercase">AIO Downloader</h1>
            <p class="text-slate-400 text-sm mt-1">Download from FB, Insta, YT & more</p>
        </div>

        <div class="relative flex items-center mb-6">
            <input type="text" id="urlInput" placeholder="https://..." 
                class="w-full p-4 pr-14 bg-slate-800 rounded-2xl border border-slate-700 focus:border-blue-500 outline-none transition-all text-white">
            <button onclick="fetchVideo()" id="mainBtn" class="absolute right-2 bg-blue-600 hover:bg-blue-500 text-white p-2.5 rounded-xl shadow-lg transition-all">
                <i class="fas fa-arrow-right text-lg" id="btnIcon"></i>
            </button>
        </div>

        <div id="resultBox" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
            
            <div class="bg-slate-800 rounded-2xl overflow-hidden border border-slate-700 shadow-inner">
                <div class="relative">
                    <img id="videoThumb" src="" class="w-full h-48 object-cover">
                    <span id="sourceLabel" class="absolute top-3 left-3 bg-blue-600 text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-widest shadow-lg"></span>
                </div>
                <div class="p-4">
                    <h3 id="videoTitle" class="text-sm font-semibold line-clamp-2 text-slate-100 italic"></h3>
                </div>
            </div>

            <div id="linksList" class="flex flex-col gap-3">
                </div>
        </div>

        <div id="statusMsg" class="hidden text-center py-6 text-slate-400 italic text-sm">
            Searching for video...
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('urlInput').value;
            const resBox = document.getElementById('resultBox');
            const status = document.getElementById('statusMsg');
            const list = document.getElementById('linksList');
            const icon = document.getElementById('btnIcon');

            if (!url) return alert("Please paste a link first!");

            // UI Loading State
            resBox.classList.add('hidden');
            status.classList.remove('hidden');
            status.innerHTML = `<i class="fas fa-circle-notch loader-spin mr-2"></i> Fetching media...`;
            icon.className = "fas fa-spinner loader-spin";

            try {
                const response = await fetch(`https://aio-dl.t-k.workers.dev/?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.error === false) {
                    // Update Details
                    document.getElementById('videoThumb').src = data.thumbnail;
                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('sourceLabel').innerText = data.source;

                    // Clear and Build Buttons
                    list.innerHTML = '';
                    data.medias.forEach(media => {
                        const btn = document.createElement('button');
                        btn.className = "download-btn flex items-center justify-between w-full bg-slate-700 hover:bg-slate-600 p-4 rounded-xl font-bold group";
                        
                        btn.innerHTML = `
                            <div class="flex items-center gap-3">
                                <i class="fas fa-video text-blue-400 group-hover:scale-110 transition"></i>
                                <span class="text-sm">Download ${media.quality} (.${media.extension})</span>
                            </div>
                            <i class="fas fa-download text-slate-500 group-hover:text-white transition"></i>
                        `;

                        // Direct Download Trigger
                        btn.onclick = () => downloadHandler(media.url, `${data.source}_video.${media.extension}`, btn);
                        
                        list.appendChild(btn);
                    });

                    status.classList.add('hidden');
                    resBox.classList.remove('hidden');
                } else {
                    alert("Video not found. Please check the URL.");
                    status.classList.add('hidden');
                }
            } catch (err) {
                console.error(err);
                alert("Server Error! Please try again later.");
                status.classList.add('hidden');
            } finally {
                icon.className = "fas fa-arrow-right";
            }
        }

        // Logic to download directly without opening new tab
        async function downloadHandler(fileUrl, fileName, btnElement) {
            const originalHTML = btnElement.innerHTML;
            btnElement.disabled = true;
            btnElement.innerHTML = `<span class="flex items-center gap-2 italic">Downloading... <i class="fas fa-sync loader-spin"></i></span>`;

            try {
                const res = await fetch(fileUrl);
                const blob = await res.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                console.warn("Direct download blocked by CORS, fallback to internal link.");
                // Fallback: Agar direct download na ho paye toh usi page par link open karein (No New Tab)
                window.location.href = fileUrl;
            } finally {
                btnElement.disabled = false;
                btnElement.innerHTML = originalHTML;
            }
        }
    </script>
</body>
</html>
