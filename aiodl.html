<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIO Downloader</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
}

h1 {
    margin-bottom: 10px;
}

.input-box {
    display: flex;
    margin-top: 15px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    padding: 12px;
    margin-left: 5px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.icons {
    margin-top: 10px;
}

.icons i {
    font-size: 22px;
    margin: 5px;
    color: #94a3b8;
}

.preview {
    margin-top: 20px;
}

video, img {
    max-width: 100%;
    border-radius: 10px;
}

.downloads a {
    display: block;
    margin-top: 10px;
    padding: 10px;
    background: #3b82f6;
    border-radius: 8px;
    text-decoration: none;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>⚡ AIO Downloader</h1>

    <div class="icons">
        <i class="fab fa-youtube"></i>
        <i class="fab fa-tiktok"></i>
        <i class="fab fa-facebook"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-twitter"></i>
    </div>

    <div class="input-box">
        <input type="text" id="url" placeholder="Paste video URL...">
        <button onclick="download()">Download</button>
    </div>

    <div class="preview" id="preview"></div>
    <div class="downloads" id="downloads"></div>
</div>

<script>
async function download() {
    let url = document.getElementById("url").value;
    let preview = document.getElementById("preview");
    let downloads = document.getElementById("downloads");

    preview.innerHTML = "Loading...";
    downloads.innerHTML = "";

    try {
        let res = await fetch(`https://aio-dl.t-k.workers.dev/?url=${encodeURIComponent(url)}`);
        let data = await res.json();

        console.log(data); // DEBUG

        preview.innerHTML = "";

        let result = data.result || data;

        // Thumbnail
        if (result.thumbnail) {
            preview.innerHTML += `<img src="${result.thumbnail}">`;
        }

        // Preview video
        if (result.video) {
            preview.innerHTML += `<video controls src="${result.video}"></video>`;
        }

        // Downloads
        if (result.medias) {
            result.medias.forEach(m => {
                downloads.innerHTML += `
                <a href="${m.url}" target="_blank">
                ⬇ ${m.quality || "Download"} (${m.extension})
                </a>`;
            });
        }

        // Fallback video
        if (result.video && downloads.innerHTML === "") {
            downloads.innerHTML += `
            <a href="${result.video}" target="_blank">
            ⬇ Download Video
            </a>`;
        }

        // Audio
        if (result.audio) {
            downloads.innerHTML += `
            <a href="${result.audio}" target="_blank">
            🎵 Download Audio
            </a>`;
        }

    } catch (err) {
        preview.innerHTML = "Error loading data";
        console.error(err);
    }
}
</script>
