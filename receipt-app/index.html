<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Receipt</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a8f08">

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  padding: 20px;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 350px;
  margin: auto;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  background: #0a8f08;
  color: white;
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Bill Receipt</h2>

  <input type="number" id="tid" placeholder="Transaction ID">

  <select id="bank">
    <option value="">Select Bank</option>
    <option value="HBL">HBL</option>
    <option value="ESAHAULAT">ESAHAULAT</option>
  </select>

  <select id="company">
    <option value="">Select Company</option>
    <option value="SAFCO">SAFCO</option>
    <option value="KASHF">KASHF</option>
    <option value="SARSO">SARSO</option>
    <option value="SEPCO">SEPCO</option>
    <option value="SSGC">SSGC</option>
    <option value="PTCL">PTCL</option>
  </select>

  <!-- 🔥 Paid By Dropdown -->
  <select id="paidby">
    <option value="">Paid By</option>
    <option value="MUHAMMAD AMEEN">MUHAMMAD AMEEN</option>
    <option value="SADAR UDDIN">SADAR UDDIN</option>
    <option value="FAIZAN ALI">FAIZAN ALI</option>
  </select>

  <input type="number" id="billid" placeholder="Bill ID">
  <input type="number" id="amount" placeholder="Amount">

  <button onclick="printReceipt()">Print Receipt</button>
</div>

<script>
function printReceipt() {
  const tid = document.getElementById("tid").value || "N/A";
  const bank = document.getElementById("bank").value || "N/A";
  const company = document.getElementById("company").value || "N/A";
  const paidby = document.getElementById("paidby").value || "N/A";
  const billid = document.getElementById("billid").value || "N/A";
  const amount = document.getElementById("amount").value || "0";

  let receipt = "";

  // 🔥 HEADER (BOLD + CENTER)
  receipt += "\x1B\x61\x01";
  receipt += "\x1B\x45\x01";
  receipt += "<--- YASEEN ELECTRONICS --->\n";
  receipt += "\x1B\x45\x00";

  receipt += "\x1B\x61\x00";

  receipt += "--------------------------------\n";

  receipt += line("Transaction ID", tid);
  receipt += line("Bank", bank);
  receipt += line("Company", company);
  receipt += line("Paid By", paidby);
  receipt += line("Bill ID", billid);

  receipt += "--------------------------------\n";

  receipt += "\x1B\x45\x01";
  receipt += line("Amount Paid", "Rs " + amount);
  receipt += "\x1B\x45\x00";

  receipt += "--------------------------------\n";

  receipt += line("Date", new Date().toLocaleString());

  receipt += "--------------------------------\n";

  receipt += "\n        Thank You\n\n\n";

  const url = "intent:" + encodeURIComponent(receipt) +
    "#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;";

  window.location.href = url;
}

// ALIGNMENT FUNCTION
function line(label, value) {
  const totalWidth = 32;
  const text = label + " : " + value;
  if (text.length >= totalWidth) return text.slice(0, totalWidth) + "\n";
  return text + " ".repeat(totalWidth - text.length) + "\n";
}

// SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
