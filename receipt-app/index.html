<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YASEEN ELECTRONICS</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a8f08">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  background:#f3f4f6;
  font-family:system-ui;
}

.container{
  max-width:380px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
  text-align:center;
  margin-top:0;
  margin-bottom:15px;
}

input,
select,
button{
  width:100%;
  padding:12px;
  margin:7px 0;
  border-radius:8px;
  border:1px solid #dcdcdc;
  font-size:15px;
}

button{
  border:none;
  background:#0a8f08;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

button:active{
  transform:scale(.98);
}

.error{
  color:red;
  font-size:13px;
  margin-top:5px;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

  <h2>Bill Receipt</h2>

  <input
    type="number"
    id="tid"
    placeholder="Transaction ID"
  >

  <select id="bank">
    <option value="">Select Bank</option>
    <option value="HBL">HBL</option>
    <option value="ESAHAULAT">ESAHAULAT</option>
  </select>

  <select id="company">
    <option value="">Select Company</option>
    <option>SAFCO</option>
    <option>KASHF</option>
    <option>SARSO</option>
    <option>SEPCO</option>
    <option>SSGC</option>
    <option>PTCL</option>
  </select>

  <select id="paidby">
    <option value="">Paid By</option>
    <option>MUHAMMAD AMEEN</option>
    <option>SADAR UDDIN</option>
    <option>FAIZAN ALI</option>
  </select>

  <input
    type="number"
    id="billid"
    placeholder="Bill ID"
  >

  <input
    type="number"
    id="amount"
    placeholder="Amount"
  >

  <div class="error" id="error"></div>

  <button onclick="handlePrint()">
    Print Receipt
  </button>

</div>

<script>

// ================= MAIN =================

async function handlePrint(){

  const data = collectData();

  if(!validate(data)) return;

  await printReceipt(data);

  clearForm();
}

// ================= DATA =================

function collectData(){

  return{

    tid:
      getVal("tid"),

    bank:
      getVal("bank"),

    company:
      getVal("company"),

    paidby:
      getVal("paidby"),

    billid:
      getVal("billid"),

    amount:
      getVal("amount"),

    date:
      new Date().toLocaleString()
  };
}

// ================= VALIDATION =================

function validate(d){

  if(
    !d.tid ||
    !d.bank ||
    !d.company ||
    !d.billid ||
    !d.amount
  ){

    showError(
      "Fill all required fields"
    );

    return false;
  }

  showError("");

  return true;
}

// ================= PRINT ENGINE =================

async function printReceipt(d){

  // ===== AUTO LOGO =====

  let leftLogo = "";
  let rightLogo = "";

  if(d.bank === "HBL"){

    leftLogo = "hbl.png";
    rightLogo = "Konnect.png";

  }else{

    leftLogo = "nadra.png";
    rightLogo = "esahulat.png";
  }

  // ===== CANVAS =====

  const canvas =
    document.createElement("canvas");

  const ctx =
    canvas.getContext("2d");

  canvas.width = 384;
  canvas.height = 900;

  // ===== WHITE BG =====

  ctx.fillStyle = "#fff";
  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  // ===== LOAD LOGOS =====

  const leftImg =
    await loadImage(leftLogo);

  const rightImg =
    await loadImage(rightLogo);

  // ===== DRAW LOGOS =====

  ctx.drawImage(
    leftImg,
    20,
    10,
    120,
    60
  );

  ctx.drawImage(
    rightImg,
    244,
    10,
    120,
    60
  );

  // ===== TITLE =====

  ctx.fillStyle = "#000";

  ctx.font =
    "bold 28px monospace";

  ctx.textAlign = "center";

  ctx.fillText(
    "YASEEN ELECTRONICS",
    192,
    110
  );

  // ===== BORDER =====

  ctx.strokeRect(
    10,
    130,
    364,
    420
  );

  // ===== RECEIPT TEXT =====

  ctx.textAlign = "left";

  ctx.font =
    "24px monospace";

  let y = 180;

  const lines = [

    `Transaction ID : ${d.tid}`,

    `Bank          : ${d.bank}`,

    `Company       : ${d.company}`,

    `Paid By       : ${d.paidby}`,

    `Bill ID       : ${d.billid}`,

    "",

    `Amount Paid   : Rs ${d.amount}`,

    "",

    `Date : ${d.date}`
  ];

  lines.forEach(line=>{

    ctx.fillText(
      line,
      25,
      y
    );

    y += 40;
  });

  // ===== FOOTER =====

  ctx.textAlign = "center";

  ctx.font =
    "bold 24px monospace";

  ctx.fillText(
    "VERIFIED RECEIPT",
    192,
    610
  );

  ctx.fillText(
    "Thank You",
    192,
    660
  );

  // ===== IMAGE =====

  const image =
    canvas.toDataURL("image/png");

  // ===== RAWBT =====

  const url =
    "intent:" +
    encodeURIComponent(image) +
    "#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;";

  window.location.href = url;
}

// ================= IMAGE LOADER =================

function loadImage(src){

  return new Promise((resolve,reject)=>{

    const img = new Image();

    img.onload =
      ()=>resolve(img);

    img.onerror =
      reject;

    img.src = src;
  });
}

// ================= HELPERS =================

function getVal(id){

  return document
    .getElementById(id)
    .value
    .trim();
}

function showError(msg){

  document
    .getElementById("error")
    .innerText = msg;
}

function clearForm(){

  document
    .querySelectorAll("input")
    .forEach(input=>{

      input.value = "";
    });

  document
    .querySelectorAll("select")
    .forEach(select=>{

      select.selectedIndex = 0;
    });
}

// ================= SERVICE WORKER =================

if("serviceWorker" in navigator){

  navigator
    .serviceWorker
    .register("sw.js");
}

</script>

</body>
</html>
