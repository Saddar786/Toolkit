<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Receipt</title>

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  padding: 20px;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 350px;
  margin: auto;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  background: #0a8f08;
  color: white;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>Bill Receipt</h2>

  <!-- Transaction ID -->
  <input type="number" id="tid" placeholder="Transaction ID">

  <!-- Bank Dropdown -->
  <select id="bank">
    <option value="">Select Bank</option>
    <option value="HBL">HBL</option>
    <option value="ESAHAULAT">ESAHAULAT</option>
  </select>

  <!-- Bill ID -->
  <input type="number" id="billid" placeholder="Bill ID">

  <!-- Amount -->
  <input type="number" id="amount" placeholder="Amount">

  <button onclick="printReceipt()">Print Receipt</button>
</div>

<script>
function printReceipt() {
  const tid = document.getElementById("tid").value || "N/A";
  const bank = document.getElementById("bank").value || "N/A";
  const billid = document.getElementById("billid").value || "N/A";
  const amount = document.getElementById("amount").value || "0";

  let receipt = "";

  receipt += "     YASEEN ELECTRONICS\n";
  receipt += "------------------------------\n";

  receipt += "Transaction ID: " + tid + "\n";
  receipt += "Bank: " + bank + "\n";
  receipt += "Bill ID: " + billid + "\n";

  receipt += "------------------------------\n";
  receipt += "Amount Paid: Rs " + amount + "\n";
  receipt += "------------------------------\n";

  receipt += "Date: " + new Date().toLocaleString() + "\n\n\n";

  const url = "intent:" + encodeURIComponent(receipt) +
    "#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;";

  window.location.href = url;
}
</script>

</body>
</html>
