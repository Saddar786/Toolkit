<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16a34a">

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  padding: 20px;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 350px;
  margin: auto;
}

input {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  background: green;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h3>Bill Receipt</h3>

  <input id="tid" placeholder="Transaction ID">
  <input id="bank" placeholder="Bank Name">
  <input id="billid" placeholder="Bill ID">
  <input id="amount" placeholder="Amount">

  <button onclick="printReceipt()">Print Receipt</button>
</div>

<script>
// ===== PRINT FUNCTION =====
function printReceipt() {
  const tid = document.getElementById("tid").value || "N/A";
  const bank = document.getElementById("bank").value || "N/A";
  const billid = document.getElementById("billid").value || "N/A";
  const amount = document.getElementById("amount").value || "0";

  let receipt = "";

  receipt += "     MAGSi COMMUNICATION\n";
  receipt += "------------------------------\n";

  receipt += "Transaction ID: " + tid + "\n";
  receipt += "Bank: " + bank + "\n";
  receipt += "Bill ID: " + billid + "\n";

  receipt += "------------------------------\n";
  receipt += "Amount Paid: Rs " + amount + "\n";
  receipt += "------------------------------\n";

  receipt += "Date: " + new Date().toLocaleString() + "\n\n\n";

  const url = "intent:" + encodeURIComponent(receipt) +
    "#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;";

  window.location.href = url;
}

// ===== SERVICE WORKER REGISTER =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
