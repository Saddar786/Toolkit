<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WiFi Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f5f9;
padding:15px;
}

.container{
max-width:1300px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
}

h2{
margin-top:0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
}

input{
padding:12px;
border:1px solid #ccc;
border-radius:10px;
width:100%;
box-sizing:border-box;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
}

.save-btn{
background:#2563eb;
margin-top:15px;
}

.logout-btn{
background:black;
margin-bottom:15px;
}

.edit-btn{
background:#eab308;
}

.delete-btn{
background:#dc2626;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin:20px 0;
}

.card{
background:#2563eb;
color:white;
padding:20px;
border-radius:15px;
}

.card h3{
margin:0;
font-size:18px;
}

.card h1{
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

.expired{
background:#ffd9d9;
color:#a10000;
}

.search{
margin-top:15px;
margin-bottom:10px;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("wifiLogin") !== "true"){

location.href = "login.html";

}

</script>

<div class="container">

<button class="logout-btn" onclick="logout()">
Logout
</button>

<h2>WiFi Customers Panel</h2>

<div class="grid">

<input type="hidden" id="editId">

<input type="text" id="name" placeholder="Customer Name">

<input type="text" id="number" placeholder="Mobile Number">

<input type="number" id="package" placeholder="Package Mbps">

<input type="number" id="amount" placeholder="Amount">

<input type="date" id="start_date">

<input type="date" id="end_date">

</div>

<button class="save-btn" onclick="saveCustomer()">
Save Customer
</button>

<input
class="search"
type="text"
id="search"
placeholder="Search Name or Number"
onkeyup="searchData()"
>

<div class="cards">

<div class="card">
<h3>Total Customers</h3>
<h1 id="totalCustomers">0</h1>
</div>

<div class="card">
<h3>Total Mbps</h3>
<h1 id="totalMbps">0</h1>
</div>

<div class="card">
<h3>Total Amount</h3>
<h1 id="totalAmount">0</h1>
</div>

</div>

<table>

<thead>

<tr>

<th>Name</th>

<th>Number</th>

<th>Package</th>

<th>Amount</th>

<th>Start Date</th>

<th>Expire Date</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="data"></tbody>

</table>

</div>

<script>

const SUPABASE_URL =
"https://hbqlqwbwrfapbkeaxhdz.supabase.co";

const API_KEY =
"sb_publishable_nvpKBQIeZ8WaOTE5RcQACQ_uqFrC6i_";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
API_KEY
);

function logout(){

localStorage.removeItem("wifiLogin");

location.href = "login.html";

}

async function saveCustomer(){

const id =
document.getElementById("editId").value;

const customer = {

"Name":
document.getElementById("name").value,

"Number":
document.getElementById("number").value,

"Package Plan":
document.getElementById("package").value,

"Amount":
document.getElementById("amount").value,

"Start date":
document.getElementById("start_date").value,

"Expire Date":
document.getElementById("end_date").value

};

let error;

if(id){

({ error } = await supabase
.from("wifiuser")
.update(customer)
.eq("id", id));

}else{

({ error } = await supabase
.from("wifiuser")
.insert([customer]));

}

if(error){

alert(error.message);

return;

}

clearForm();

loadCustomers();

alert(id ? "Customer Updated" : "Customer Added");

}

function clearForm(){

document.getElementById("editId").value = "";

document.getElementById("name").value = "";

document.getElementById("number").value = "";

document.getElementById("package").value = "";

document.getElementById("amount").value = "";

document.getElementById("start_date").value = "";

document.getElementById("end_date").value = "";

}

async function loadCustomers(){

const { data, error } = await supabase
.from("wifiuser")
.select("*")
.order("id",{ ascending:false });

if(error){

alert(error.message);

return;

}

renderTable(data);

}

function renderTable(data){

let html = "";

let totalCustomers = 0;

let totalAmount = 0;

let totalMbps = 0;

const today = new Date();

data.forEach(e=>{

totalCustomers++;

totalAmount += Number(e["Amount"] || 0);

totalMbps += Number(e["Package Plan"] || 0);

const expired =
new Date(e["Expire Date"]) < today;

html += `

<tr class="${expired ? 'expired' : ''}">

<td>${e["Name"]}</td>

<td>${e["Number"]}</td>

<td>${e["Package Plan"]} Mbps</td>

<td>Rs ${e["Amount"]}</td>

<td>${e["Start date"]}</td>

<td>${e["Expire Date"]}</td>

<td>

<button
class="edit-btn"
onclick='editCustomer(${JSON.stringify(e)})'>
Edit
</button>

<button
class="delete-btn"
onclick='deleteCustomer(${e.id})'>
Delete
</button>

</td>

</tr>

`;

});

document.getElementById("data").innerHTML = html;

document.getElementById("totalCustomers").innerText =
totalCustomers;

document.getElementById("totalAmount").innerText =
"Rs " + totalAmount;

document.getElementById("totalMbps").innerText =
totalMbps + " Mbps";

}

window.editCustomer = (e)=>{

document.getElementById("editId").value = e.id;

document.getElementById("name").value = e["Name"];

document.getElementById("number").value = e["Number"];

document.getElementById("package").value =
e["Package Plan"];

document.getElementById("amount").value =
e["Amount"];

document.getElementById("start_date").value =
e["Start date"];

document.getElementById("end_date").value =
e["Expire Date"];

}

window.deleteCustomer = async(id)=>{

if(!confirm("Delete Customer?")) return;

await supabase
.from("wifiuser")
.delete()
.eq("id",id);

loadCustomers();

}

async function searchData(){

const search =
document.getElementById("search")
.value
.toLowerCase();

const { data } = await supabase
.from("wifiuser")
.select("*")
.order("id",{ ascending:false });

const filtered = data.filter(e => {

const name =
(e["Name"] || "").toLowerCase();

const number =
(e["Number"] || "").toLowerCase();

return (
name.includes(search) ||
number.includes(search)
);

});

renderTable(filtered);

}

loadCustomers();

</script>

</body>
</html>
