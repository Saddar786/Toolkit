<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Search System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family:Arial;
      background:#f4f7f6;
      padding:20px;
    }

    .card{
      max-width:800px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
      color:#005c2e;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:8px;
      border:2px solid #005c2e;
      margin-bottom:10px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      background:#005c2e;
      color:white;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    .result-box{
      margin-top:20px;
    }

    .record{
      border-bottom:1px solid #ddd;
      padding:10px 0;
    }

    .row{
      display:flex;
      justify-content:space-between;
      font-size:13px;
      padding:4px 0;
    }

    .key{
      color:#555;
    }

    .value{
      font-weight:bold;
      text-align:right;
    }

    /* Popup */
    #noDataModal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    .modal-box{
      background:white;
      padding:25px;
      border-radius:12px;
      width:90%;
      max-width:350px;
      text-align:center;
    }

    .modal-box h3{
      color:#d42b2b;
    }

    .modal-box button{
      margin-top:15px;
      width:auto;
      padding:8px 18px;
    }

  </style>
</head>
<body>

<div class="card">
  <h2>Search by CNIC</h2>

  <input type="text" id="searchInput" placeholder="Enter CNIC, Mobile or Name">
  <button onclick="searchData()">Search</button>

  <div class="result-box" id="resultBox"></div>
</div>

<!-- No Data Popup -->
<div id="noDataModal">
  <div class="modal-box">
    <div style="font-size:40px;">🔍</div>
    <h3>No Data Found</h3>
    <p>No record found for the entered value.</p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>

const SUPABASE_URL = "https://hbqlqwbwrfapbkeaxhdz.supabase.co";
const API_KEY = "sb_publishable_nvpKBQIeZ8WaOTE5RcQACQ_uqFrC6i_";

async function searchData(){

  const value = document.getElementById("searchInput").value.trim();
  const resultBox = document.getElementById("resultBox");
  resultBox.innerHTML = "";

  if(!value){
    alert("Enter something to search");
    return;
  }

  let query = "";

  if(/^\d{13}$/.test(value)){
    query = `CNIC=eq.${value}`;
  }
  else if(/^\d{10,12}$/.test(value)){
    query = `MOBILE=eq.${value}`;
  }
  else{
    query = `WOMAN_NAME=ilike.*${value}*`;
  }

  try{

    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/wazifa?${query}&limit=50`,
      {
        headers:{
          "apikey":API_KEY,
          "Authorization":`Bearer ${API_KEY}`
        }
      }
    );

    const data = await response.json();

    if(!data || data.length === 0){
      showModal();
      return;
    }

    renderResults(data);

  }catch(e){
    alert("Connection error");
  }
}

function renderResults(data){

  const resultBox = document.getElementById("resultBox");

  data.forEach(record=>{

    let html = `<div class="record">`;

    Object.keys(record).forEach(key=>{
      html += `
        <div class="row">
          <span class="key">${key}</span>
          <span class="value">${record[key] ?? ""}</span>
        </div>
      `;
    });

    html += `</div>`;

    resultBox.innerHTML += html;
  });

}

function showModal(){
  document.getElementById("noDataModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("noDataModal").style.display = "none";
}

</script>

</body>
</html>
